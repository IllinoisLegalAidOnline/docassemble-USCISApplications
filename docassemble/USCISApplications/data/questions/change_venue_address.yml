---
id: review_cov_questions
continue button field: review_cov_questions
question: |
  COV screener
subquestion: |
  <div class="alert alert-info ilao-info" role="alert">
    <h2 class="h4">Call a supervisor to review NTA</h2>
    <p>
      Wait for the supervisor to check your work and decide if each applicant can continue or not.
    </p>
    <p>
    If any applicant is screened out, continue the interview for the remaining applicants.
    The applicant should stay until you are able to print the screener and retainer agreement.
    </p>
  </div>

fields:
  - Have you hired an attorney for your immigration case?: cov_attorney
    datatype: yesnoradio
  - Who is the lead respondent?: lead_respondent
    datatype: radio
    code: |
      lead_choices
  - note: |
      We will collect the name of the lead respondent
    show if:
      variable: lead_respondent
      is: "Other"
  - How many riders are on the case?: cov_riders
    datatype: integer
  - Have you previously appeared in immigration court?: previous_court
    datatype: yesnoradio
  - Do all the parties on the case want the venue changed?: all_change_venue
    datatype: yesnoradio

  - What should happen with this change of venue?: cov_supervisor_overall_approval_status
    datatype: radio
    choices:
      - All applicants can **continue**: approved
      - Do not continue: denied
    show if:
      code: |
        len(users) > 1
  - What should happen with this application?: cov_supervisor_overall_approval_status
    datatype: radio
    choices:
      - Continue application: approved
      - Do not continue: denied
    show if:
      code: |
        len(users) == 1
    minlength: 1
  - Supervisor name: cov_supervisor_name
  - Supervisor notes: cov_supervisor_notes
    required: False
    datatype: area
