code: |
  # Create new ALIndividual objects for motion_users without users reference
  motion_users.clear()
  for idx, user in enumerate(users):
    new_user = motion_users[idx]
    new_user.name.first = user.name.first
    new_user.name.middle = user.name.middle if hasattr(user.name, 'middle') else ''
    new_user.name.last = user.name.last
    new_user.a_number = user.a_number if hasattr(user, 'a_number') else ''
    new_user.birthdate = user.birthdate if hasattr(user, 'birthdate') else None
    # Copy address from user if they did any prior forms
    if hasattr(user, 'address') and hasattr(user.address, 'address'):
      new_user.address.address = user.address.address
      new_user.address.city = user.address.city
      new_user.address.state = user.address.state
      new_user.address.zip = user.address.zip
      new_user.address.unit = user.address.unit if hasattr(user.address, 'unit') else ''
      new_user.address.address_type = user.address.address_type if hasattr(user.address, 'address_type') else 'other'
    if hasattr(user, 'mailing_address') and hasattr(user.mailing_address, 'address'):
      new_user.mailing_address.address = user.mailing_address.address
      new_user.mailing_address.city = user.mailing_address.city
      new_user.mailing_address.state = user.mailing_address.state
      new_user.mailing_address.zip = user.mailing_address.zip
      new_user.mailing_address.unit = user.mailing_address.unit if hasattr(user.mailing_address, 'unit') else ''
    new_user.names_only = True
  motion_users.there_is_another = False
  motion_users.there_are_any = True
  motion_users.gathered = True
  create_motion_ordering = True
