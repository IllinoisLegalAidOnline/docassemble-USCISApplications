##### CHANGE OF VENUE/ADDRESS (COV/COA) #####
objects:
  - immigration_judge: ALIndividual
  - dhs: ALIndividual
  - dhs.address: ALAddress
  - motion_users: ALPeopleList.using(complete_attribute='names_only', auto_gather=True)
  - motion_users[i].address: ALAddress
  - motion_users[i].mailing_address: ALAddress
  - motion_users[i].previous: ALIndividual
  - motion_users[i].previous.address: ALAddress
  - users[i].previous: ALIndividual
  - users[i].previous.address: ALAddress
  - illinois_move_date: Date
