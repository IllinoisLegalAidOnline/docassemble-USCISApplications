sets:
  - motion_users[0].address.address
  - motion_users[0].address.city
  - motion_users[0].address.zip
  - motion_users[0].address.unit
  - motion_users[0].address.state
id: motion users address first
question: |
  ${ motion_users[0] }'s current address
subquestion: |
  This is your current, physical address. Mailing address will be entered on another screen.
fields:
  - Street address: motion_users[0].address.address
    address autocomplete: True
  - Address is a: motion_users[0].address.address_type
    datatype: radio
    choices:
      - Apartment: apt
      - Suite: suite
      - Floor: floor
      - Other (including house): other
  - Apartment/Suite/Floor number: motion_users[0].address.unit
    required: False
  - City or Town: motion_users[0].address.city
  - State: motion_users[0].address.state
    required: False
    code: |
      states_list(country_code=AL_DEFAULT_COUNTRY)
    default: ${ AL_DEFAULT_STATE }
  - ZIP: motion_users[0].address.zip
  - Daytime Phone Number (optional): motion_users[0].phone_number
    required: false
  - Mobile Telephone Number (optional): motion_users[0].mobile_number
    required: false
  - Email address (optional): motion_users[0].email
    required: false
---
code: |
  address_choices = []
  address_choices.clear()
  for user in motion_users.complete_elements():
    if hasattr(user.address, 'address'):
      address_choices.append(user.address)
